# ==================================================================
# Generate SQL Tuning Advisor Report (top SQL from AWR period)
# ==================================================================
- name: Get top SQL_ID from AWR period for tuning
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.shell: |
    export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1
    export ORACLE_SID={{ rac_db_name }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET HEADING OFF FEEDBACK OFF PAGESIZE 0 LINESIZE 200 TRIMOUT ON TRIMSPOOL ON
    SELECT 'TOP_SQL=' || sql_id FROM (
      SELECT sql_id FROM dba_hist_sqlstat
      WHERE snap_id BETWEEN {{ _awr_begin_id }} AND {{ _awr_end_id }}
        AND parsing_schema_name NOT IN ('SYS','SYSTEM','DBSNMP','AUDSYS','MDSYS')
      ORDER BY elapsed_time_delta DESC
    ) WHERE ROWNUM <= 5;
    EXIT;
    EOF
  register: _sqltune_top_sql
  changed_when: false

- name: Parse top SQL IDs
  ansible.builtin.set_fact:
    _sqltune_sql_ids: "{{ _sqltune_top_sql.stdout_lines | select('match', '.*TOP_SQL=') | map('regex_replace', '.*TOP_SQL=(.*)$', '\\1') | map('trim') | list }}"

- name: Generate SQL Tuning Advisor report on primary
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.shell: |
    export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1
    export ORACLE_SID={{ rac_db_name }}
    export PATH=$ORACLE_HOME/bin:$PATH

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    SQLTUNE_FILE="/tmp/sqltune_report_${TIMESTAMP}.txt"
    TASK_NAME="SQLTUNE_ANSIBLE_${TIMESTAMP}"

    sqlplus -s / as sysdba <<EOF
    SET SERVEROUTPUT ON SIZE UNLIMITED
    SET LONG 10000000
    SET LONGCHUNKSIZE 10000000
    SET LINESIZE 32767
    SET PAGESIZE 0
    SET FEEDBACK OFF
    SET VERIFY OFF
    SET HEADING OFF
    SET TRIMSPOOL ON

    DECLARE
      v_task VARCHAR2(100) := '${TASK_NAME}';
      v_sqlset VARCHAR2(100);
    BEGIN
      -- Create tuning task with the top SQL statements
      DBMS_SQLTUNE.CREATE_TUNING_TASK(
        begin_snap    => {{ _awr_begin_id }},
        end_snap      => {{ _awr_end_id }},
        task_name     => v_task,
        description   => 'Auto tuning snap {{ _awr_begin_id }} to {{ _awr_end_id }}',
        scope         => DBMS_SQLTUNE.SCOPE_COMPREHENSIVE,
        time_limit    => 120
      );
      DBMS_SQLTUNE.EXECUTE_TUNING_TASK(v_task);
    END;
    /

    SPOOL ${SQLTUNE_FILE}
    SELECT DBMS_SQLTUNE.REPORT_TUNING_TASK('${TASK_NAME}', 'TEXT', 'ALL', 'ALL') FROM dual;
    SPOOL OFF

    EXEC DBMS_SQLTUNE.DROP_TUNING_TASK('${TASK_NAME}');
    EXIT;
    EOF

    if [ -s "$SQLTUNE_FILE" ]; then
      echo "SQLTUNE_PATH=$SQLTUNE_FILE"
      echo "SQLTUNE_SIZE=$(du -h "$SQLTUNE_FILE" | cut -f1)"
    else
      echo "SQLTUNE_PATH="
      echo "SQLTUNE_SIZE=0"
    fi
  register: _sqltune_generate
  async: 300
  poll: 10
  when: _sqltune_sql_ids | length > 0
  failed_when: false

- name: Parse SQL Tuning report path
  ansible.builtin.set_fact:
    _sqltune_remote_path: "{{ (_sqltune_generate.stdout_lines | select('match', '^SQLTUNE_PATH=') | first | default('SQLTUNE_PATH=')).split('=', 1)[1] | default('') | trim }}"
    _sqltune_size: "{{ (_sqltune_generate.stdout_lines | select('match', '^SQLTUNE_SIZE=') | first | default('SQLTUNE_SIZE=0')).split('=', 1)[1] | default('0') | trim }}"
  when: _sqltune_generate is defined and _sqltune_generate is not skipped and _sqltune_generate is not failed

- name: Set SQL Tuning defaults
  ansible.builtin.set_fact:
    _sqltune_remote_path: ""
    _sqltune_size: "0"
  when: _sqltune_remote_path is not defined

- name: Fetch SQL Tuning report from primary
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.fetch:
    src: "{{ _sqltune_remote_path }}"
    dest: "{{ playbook_dir }}/oracle-rac/{{ _sqltune_remote_path | basename }}"
    flat: true
  when: _sqltune_remote_path | length > 0

- name: Clean up remote SQL Tuning report
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.file:
    path: "{{ _sqltune_remote_path }}"
    state: absent
  when: _sqltune_remote_path | length > 0

# ==================================================================
# Generate Health Monitor Report
# ==================================================================
- name: Generate Health Monitor report on primary
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.shell: |
    export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1
    export ORACLE_SID={{ rac_db_name }}
    export PATH=$ORACLE_HOME/bin:$PATH

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    HM_FILE="/tmp/healthmon_report_${TIMESTAMP}.html"

    sqlplus -s / as sysdba <<'EOF'
    SET SERVEROUTPUT ON SIZE UNLIMITED
    SET LINESIZE 32767
    SET PAGESIZE 0
    SET LONG 10000000
    SET LONGCHUNKSIZE 10000000
    SET FEEDBACK OFF
    SET VERIFY OFF
    SET HEADING OFF
    SET TRIMSPOOL ON

    -- Run the Dictionary Integrity check
    BEGIN
      DBMS_HM.RUN_CHECK('Dictionary Integrity Check', 'HM_DICT_ANSIBLE');
    EXCEPTION WHEN OTHERS THEN
      -- Task may already exist from a prior run
      IF SQLCODE = -36503 THEN NULL; ELSE RAISE; END IF;
    END;
    /

    SPOOL /tmp/healthmon_report_PLACEHOLDER.html
    SELECT DBMS_HM.GET_RUN_REPORT('HM_DICT_ANSIBLE', 'HTML', 'DETAIL') FROM dual;
    SPOOL OFF
    EXIT;
    EOF

    # Rename placeholder to actual timestamp
    mv /tmp/healthmon_report_PLACEHOLDER.html "$HM_FILE" 2>/dev/null || true

    if [ -s "$HM_FILE" ]; then
      echo "HM_PATH=$HM_FILE"
      echo "HM_SIZE=$(du -h "$HM_FILE" | cut -f1)"
    else
      echo "HM_PATH="
      echo "HM_SIZE=0"
    fi
  register: _hm_generate
  async: 120
  poll: 10
  failed_when: false

- name: Parse Health Monitor report path
  ansible.builtin.set_fact:
    _hm_remote_path: "{{ (_hm_generate.stdout_lines | select('match', '^HM_PATH=') | first | default('HM_PATH=')).split('=', 1)[1] | default('') | trim }}"
    _hm_size: "{{ (_hm_generate.stdout_lines | select('match', '^HM_SIZE=') | first | default('HM_SIZE=0')).split('=', 1)[1] | default('0') | trim }}"
  when: _hm_generate is not failed

- name: Set Health Monitor defaults on failure
  ansible.builtin.set_fact:
    _hm_remote_path: ""
    _hm_size: "0"
  when: _hm_generate is failed or _hm_remote_path is not defined

- name: Fetch Health Monitor report from primary
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.fetch:
    src: "{{ _hm_remote_path }}"
    dest: "{{ playbook_dir }}/oracle-rac/{{ _hm_remote_path | basename }}"
    flat: true
  when: _hm_remote_path | length > 0

- name: Clean up remote Health Monitor report
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.file:
    path: "{{ _hm_remote_path }}"
