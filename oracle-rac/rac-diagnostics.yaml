# ==================================================================
# Generate ASH Report (Active Session History)
# ==================================================================
- name: Generate ASH HTML report on primary
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.shell: |
    export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1
    export ORACLE_SID={{ rac_db_name }}
    export PATH=$ORACLE_HOME/bin:$PATH

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    ASH_FILE="/tmp/ash_report_${TIMESTAMP}.html"

    sqlplus -s / as sysdba <<EOF
    SET LINESIZE 32767
    SET PAGESIZE 0
    SET LONG 10000000
    SET LONGCHUNKSIZE 10000000
    SET TERMOUT OFF
    SET FEEDBACK OFF
    SET VERIFY OFF
    SET HEADING OFF
    SET TRIMSPOOL ON
    SPOOL ${ASH_FILE}

    SELECT output FROM TABLE(DBMS_WORKLOAD_REPOSITORY.ASH_REPORT_HTML(
      (SELECT dbid FROM v\$database),
      (SELECT instance_number FROM v\$instance),
      (SELECT begin_interval_time FROM dba_hist_snapshot WHERE snap_id = {{ _awr_begin_id }}),
      (SELECT end_interval_time   FROM dba_hist_snapshot WHERE snap_id = {{ _awr_end_id }})
    ));

    SPOOL OFF
    EXIT;
    EOF

    if [ -s "$ASH_FILE" ]; then
      echo "ASH_PATH=$ASH_FILE"
      echo "ASH_SIZE=$(du -h "$ASH_FILE" | cut -f1)"
    else
      echo "ERROR: ASH report file is empty or missing"
      exit 1
    fi
  register: _ash_generate
  async: 300
  poll: 10

- name: Parse ASH report path
  ansible.builtin.set_fact:
    _ash_remote_path: "{{ (_ash_generate.stdout_lines | select('match', '^ASH_PATH=') | first).split('=', 1)[1] }}"
    _ash_size: "{{ (_ash_generate.stdout_lines | select('match', '^ASH_SIZE=') | first).split('=', 1)[1] }}"

- name: Fetch ASH report from primary
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.fetch:
    src: "{{ _ash_remote_path }}"
    dest: "{{ playbook_dir }}/oracle-rac/{{ _ash_remote_path | basename }}"
    flat: true

- name: Clean up remote ASH report
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.file:
    path: "{{ _ash_remote_path }}"
    state: absent

