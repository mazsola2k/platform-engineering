# ==================================================================
# Summary
# ==================================================================
- name: Display key AWR metrics from database
  delegate_to: "{{ rac_node_names[0] }}"
  become: true
  become_user: oracle
  ansible.builtin.shell: |
    export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1
    export ORACLE_SID={{ rac_db_name }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET LINESIZE 200
    SET PAGESIZE 50
    PROMPT ====== Instance Info ======
    SELECT instance_name, host_name, status, TO_CHAR(startup_time,'YYYY-MM-DD HH24:MI') AS started FROM v$instance;

    PROMPT ====== Database Info ======
    SELECT name, db_unique_name, open_mode, database_role, protection_mode FROM v$database;

    PROMPT ====== SGA/PGA ======
    SHOW PARAMETER sga_target;
    SHOW PARAMETER pga_aggregate_target;

    PROMPT ====== Tablespace Usage ======
    COL tablespace_name FORMAT A25
    COL size_mb FORMAT 999999.99
    COL pct_used FORMAT 999.9
    SELECT t.tablespace_name,
           ROUND(t.bytes/1024/1024,2) AS size_mb,
           ROUND((t.bytes - NVL(f.bytes,0))/t.bytes*100,1) AS pct_used
    FROM (SELECT tablespace_name, SUM(bytes) bytes FROM dba_data_files GROUP BY tablespace_name) t
    LEFT JOIN (SELECT tablespace_name, SUM(bytes) bytes FROM dba_free_space GROUP BY tablespace_name) f
      ON t.tablespace_name = f.tablespace_name
    ORDER BY pct_used DESC;

    PROMPT ====== Top Wait Events (last snapshot) ======
    COL event_name FORMAT A45
    COL wait_class FORMAT A15
    SELECT * FROM (
      SELECT event_name, wait_class, total_waits, ROUND(time_waited_micro/1000000,2) AS time_sec
      FROM dba_hist_system_event
      WHERE snap_id = {{ _awr_end_id }}
        AND wait_class != 'Idle'
      ORDER BY time_waited_micro DESC
    ) WHERE ROWNUM <= 10;

    PROMPT ====== Instance Efficiency ======
    SELECT ROUND(
      (SELECT SUM(value) FROM v$sysstat WHERE name = 'consistent gets') /
      NULLIF((SELECT SUM(value) FROM v$sysstat WHERE name IN ('consistent gets','physical reads')),0) * 100, 2
    ) AS buffer_cache_hit_pct FROM dual;

    PROMPT ====== Blocked Sessions (current) ======
    COL blocking_session FORMAT 999999
    COL blocked_session FORMAT 999999
    COL blocked_sql FORMAT A50
    COL wait_event FORMAT A35
    COL wait_secs FORMAT 99999
    SELECT w.blocking_session,
           w.sid AS blocked_session,
           SUBSTR(s.sql_id || ' - ' || SUBSTR(q.sql_text,1,40),1,50) AS blocked_sql,
           w.event AS wait_event,
           w.seconds_in_wait AS wait_secs
    FROM v$session w
    JOIN v$session s ON w.sid = s.sid
    LEFT JOIN v$sql q ON s.sql_id = q.sql_id AND ROWNUM <= 1
    WHERE w.blocking_session IS NOT NULL
    ORDER BY w.seconds_in_wait DESC;

    PROMPT ====== Long Running SQL (active > 5s) ======
    COL sid_serial FORMAT A12
    COL sql_id FORMAT A15
    COL elapsed_sec FORMAT 999999.9
    COL sql_text_short FORMAT A60
    SELECT s.sid || ',' || s.serial# AS sid_serial,
           s.sql_id,
           ROUND(s.last_call_et,1) AS elapsed_sec,
           SUBSTR(q.sql_text,1,60) AS sql_text_short
    FROM v$session s
    LEFT JOIN v$sql q ON s.sql_id = q.sql_id AND q.child_number = 0
    WHERE s.status = 'ACTIVE'
      AND s.type = 'USER'
      AND s.last_call_et > 5
      AND s.sql_id IS NOT NULL
    ORDER BY s.last_call_et DESC
    FETCH FIRST 10 ROWS ONLY;

    PROMPT ====== Top SQL by Elapsed Time (AWR) ======
    COL sql_id FORMAT A15
    COL elapsed_sec FORMAT 999999.9
    COL executions FORMAT 999999999
    COL avg_sec FORMAT 99999.99
    COL sql_text_short FORMAT A55
    SELECT * FROM (
      SELECT s.sql_id,
             ROUND(s.elapsed_time_delta/1000000,1) AS elapsed_sec,
             s.executions_delta AS executions,
             ROUND(CASE WHEN s.executions_delta > 0
                        THEN s.elapsed_time_delta/s.executions_delta/1000000
                        ELSE 0 END, 2) AS avg_sec,
             SUBSTR(t.sql_text,1,55) AS sql_text_short
      FROM dba_hist_sqlstat s
      JOIN dba_hist_sqltext t ON s.sql_id = t.sql_id AND s.dbid = t.dbid
      WHERE s.snap_id = {{ _awr_end_id }}
      ORDER BY s.elapsed_time_delta DESC
    ) WHERE ROWNUM <= 10;
    EXIT;
    EOF
  register: _awr_summary
  changed_when: false

- name: Display diagnostic summary
  ansible.builtin.debug:
    msg:
      - "====== Reports Generated ======"
      - "  1. AWR Report:      snap {{ _awr_begin_id }} → {{ _awr_end_id }} ({{ _awr_report_size }})"
      - "     → oracle-rac/{{ _awr_remote_path | basename }}"
      - "  2. AWR Diff:        {{ (_awr_diff_possible | bool) | ternary('Period1 ' ~ _awr_begin_id ~ '→' ~ _awr_mid_id ~ ' vs Period2 ' ~ _awr_mid_id ~ '→' ~ _awr_end_id ~ ' (' ~ (_awr_diff_size | default('N/A')) ~ ')', 'Skipped (< 3 snapshots)') }}"
      - "     {{ (_awr_diff_possible | bool) | ternary('→ oracle-rac/' ~ (_awr_diff_remote_path | default('/tmp/none') | basename), '') }}"
      - "  3. ADDM Report:     snap {{ _awr_begin_id }} → {{ _awr_end_id }} ({{ _addm_size }})"
      - "     → oracle-rac/{{ _addm_remote_path | basename }}"
      - "  4. ASH Report:      snap {{ _awr_begin_id }} → {{ _awr_end_id }} ({{ _ash_size }})"
      - "     → oracle-rac/{{ _ash_remote_path | basename }}"
      - "  5. SQL Monitor:     {{ (_sqlmon_remote_path | length > 0) | ternary(_sqlmon_size, 'No monitored SQL found') }}"
      - "     {{ (_sqlmon_remote_path | length > 0) | ternary('→ oracle-rac/' ~ (_sqlmon_remote_path | basename), '') }}"
      - "  6. SQL Tuning:      {{ (_sqltune_remote_path | length > 0) | ternary(_sqltune_size ~ ' (' ~ (_sqltune_sql_ids | default([]) | length) ~ ' SQL analyzed)', 'No user SQL to tune') }}"
      - "     {{ (_sqltune_remote_path | length > 0) | ternary('→ oracle-rac/' ~ (_sqltune_remote_path | basename), '') }}"
      - "  7. Health Monitor:  {{ (_hm_remote_path | length > 0) | ternary(_hm_size ~ ' (Dictionary Integrity)', 'Check unavailable') }}"
      - "     {{ (_hm_remote_path | length > 0) | ternary('→ oracle-rac/' ~ (_hm_remote_path | basename), '') }}"
      - ""
      - "{{ _awr_summary.stdout_lines }}"
