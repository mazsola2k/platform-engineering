---
# Configure Oracle Data Guard Broker for automated failover management.
# Creates a broker configuration linking the primary and standby databases.
# Optionally enables Fast-Start Failover (FSFO) if rac_fsfo is true.

# ---- Set IPs (use L2 static IPs) ----
- name: Set primary IP for DG broker
  ansible.builtin.set_fact:
    dg_primary_ip: "{{ rac_node1_priv_ip }}"

- name: Add primary to inventory for DG broker
  ansible.builtin.add_host:
    name: "{{ rac_node_names[0] }}"
    ansible_host: "{{ dg_primary_ip }}"
    ansible_user: "root"
    ansible_password: "{{ rac_oracle_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

# ---- Enable DG Broker on primary ----
- name: Enable Data Guard Broker on primary
  delegate_to: "{{ rac_node_names[0] }}"
  ansible.builtin.shell: |
    su - oracle -c "export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1; export ORACLE_SID={{ rac_db_name }}; printf 'ALTER SYSTEM SET DG_BROKER_START=TRUE SCOPE=BOTH;\n' | \$ORACLE_HOME/bin/sqlplus -s / as sysdba"
  register: dg_broker_enable_primary

# ---- Enable DG Broker on standby ----
- name: Set standby IP for DG broker
  ansible.builtin.set_fact:
    dg_standby_ip: "{{ rac_standby_priv_ip }}"

- name: Add standby to inventory for DG broker
  ansible.builtin.add_host:
    name: "{{ rac_standby_name }}"
    ansible_host: "{{ dg_standby_ip }}"
    ansible_user: "root"
    ansible_password: "{{ rac_oracle_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Enable Data Guard Broker on standby
  delegate_to: "{{ rac_standby_name }}"
  ansible.builtin.shell: |
    su - oracle -c "export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1; export ORACLE_SID={{ rac_db_name }}; printf 'ALTER SYSTEM SET DG_BROKER_START=TRUE SCOPE=BOTH;\n' | \$ORACLE_HOME/bin/sqlplus -s / as sysdba"
  register: dg_broker_enable_standby

- name: Wait for DG Broker to start on both databases
  ansible.builtin.pause:
    seconds: 15

# ---- Create broker configuration via DGMGRL ----
- name: Check if Data Guard Broker configuration exists
  delegate_to: "{{ rac_node_names[0] }}"
  ansible.builtin.shell: |
    su - oracle -c "export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1; export ORACLE_SID={{ rac_db_name }}; echo 'SHOW CONFIGURATION;' | \$ORACLE_HOME/bin/dgmgrl /"
  register: dgmgrl_check
  changed_when: false
  failed_when: false

- name: Remove existing Data Guard Broker configuration (re-install cleanup)
  delegate_to: "{{ rac_node_names[0] }}"
  ansible.builtin.shell: |
    su - oracle -c "export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1; export ORACLE_SID={{ rac_db_name }}; printf 'DISABLE CONFIGURATION;\nREMOVE CONFIGURATION;\nEXIT;\n' | \$ORACLE_HOME/bin/dgmgrl /"
  when: "'Configuration -' in dgmgrl_check.stdout"
  register: dgmgrl_remove
  changed_when: true

- name: Create Data Guard Broker configuration
  delegate_to: "{{ rac_node_names[0] }}"
  ansible.builtin.shell: |
    su - oracle -c "export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1; export ORACLE_SID={{ rac_db_name }}; \$ORACLE_HOME/bin/dgmgrl / <<'EOF'
    CREATE CONFIGURATION '{{ rac_cluster_name }}_dg' AS PRIMARY DATABASE IS '{{ rac_db_name }}' CONNECT IDENTIFIER IS '{{ rac_db_name }}_PRIMARY';
    ADD DATABASE '{{ rac_db_name }}_STDBY' AS CONNECT IDENTIFIER IS '{{ rac_db_name }}_STDBY';
    ENABLE CONFIGURATION;
    SHOW CONFIGURATION;
    EXIT;
    EOF"
  register: dgmgrl_config_result

- name: Display DG Broker configuration result
  ansible.builtin.debug:
    msg:
      - "✅ Data Guard Broker configured"
      - "{{ dgmgrl_config_result.stdout_lines | default(['Configuration output not available']) }}"

# ---- Enable Fast-Start Failover (if rac_fsfo is true) ----
- name: Enable Fast-Start Failover
  delegate_to: "{{ rac_node_names[0] }}"
  ansible.builtin.shell: |
    su - oracle -c "export ORACLE_HOME=/u01/app/oracle/product/26ai/dbhome_1; export ORACLE_SID={{ rac_db_name }}; \$ORACLE_HOME/bin/dgmgrl / <<'EODG'
    ENABLE FAST_START FAILOVER;
    SHOW FAST_START FAILOVER;
    EXIT;
    EODG"
  register: fsfo_enable_result
  when: rac_fsfo | bool

- name: Display FSFO status
  ansible.builtin.debug:
    msg:
      - "✅ Fast-Start Failover enabled"
      - "{{ fsfo_enable_result.stdout_lines | default(['FSFO output not available']) }}"
  when: rac_fsfo | bool
