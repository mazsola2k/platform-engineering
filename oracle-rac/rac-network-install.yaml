---
# Create L2 VXLAN bridge network for Oracle RAC interconnect.
# Sets up: br-vm bridge, vxlan100 tunnel, Multus NetworkAttachmentDefinition.
# Provides true Layer 2 connectivity between all VMs — eliminates masquerade workarounds.

# ---- Ensure Multus CNI is present ----
- name: Check if Multus CRD exists
  ansible.builtin.shell:
    cmd: kubectl get crd network-attachment-definitions.k8s.cni.cncf.io 2>/dev/null && echo "FOUND" || echo "NOT_FOUND"
  register: multus_crd_check
  changed_when: false

- name: Install Multus CNI (thin plugin)
  ansible.builtin.shell:
    cmd: kubectl apply -f https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/master/deployments/multus-daemonset.yml
  register: multus_install_result
  when: "'NOT_FOUND' in multus_crd_check.stdout"

- name: Wait for Multus CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: network-attachment-definitions.k8s.cni.cncf.io
  register: multus_crd_wait
  until: multus_crd_wait.resources | length > 0
  retries: 30
  delay: 5
  when: "'NOT_FOUND' in multus_crd_check.stdout"

- name: Wait for Multus pods to be ready
  ansible.builtin.shell:
    cmd: kubectl -n kube-system wait --for=condition=ready pod -l app=multus --timeout=120s 2>&1 || true
  when: "'NOT_FOUND' in multus_crd_check.stdout"

- name: Fix Multus kubeconfig to use real API server endpoint
  ansible.builtin.shell: |
    KUBECONFIG_FILE=/etc/cni/net.d/multus.d/multus.kubeconfig
    if [ -f "$KUBECONFIG_FILE" ]; then
      API_SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
      if grep -q "10.96.0.1" "$KUBECONFIG_FILE" 2>/dev/null; then
        sed -i "s|server: https://10.96.0.1:443|server: $API_SERVER|" "$KUBECONFIG_FILE"
        echo "Fixed Multus kubeconfig: cluster-IP -> $API_SERVER"
      else
        echo "Multus kubeconfig already uses real API endpoint"
      fi
    else
      echo "Multus kubeconfig not found yet — will be created by daemonset"
    fi
  become: true

- name: Ensure Calico CNI kubeconfig has fresh token and real API server
  ansible.builtin.shell: |
    KUBECONFIG_FILE=/etc/cni/net.d/calico-kubeconfig
    API_SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
    NEEDS_RESTART=false

    if [ -f "$KUBECONFIG_FILE" ]; then
      # Check if Calico token is expired
      TOKEN=$(grep -oP 'token: \K\S+' "$KUBECONFIG_FILE" | tr -d '"')
      if [ -n "$TOKEN" ]; then
        # Decode JWT payload and check exp
        EXP=$(echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('exp',0))" 2>/dev/null || echo 0)
        NOW=$(date +%s)
        if [ "$EXP" -lt "$NOW" ] 2>/dev/null; then
          echo "Calico token expired (exp=$EXP, now=$NOW), restarting calico-node"
          NEEDS_RESTART=true
        fi
      fi
    fi

    # Restart calico-node to regenerate kubeconfig with fresh token if needed
    if [ "$NEEDS_RESTART" = "true" ]; then
      CALICO_POD=$(kubectl -n kube-system get pods -l k8s-app=calico-node -o name 2>/dev/null | head -1)
      if [ -n "$CALICO_POD" ]; then
        kubectl -n kube-system delete "$CALICO_POD" --wait=true --timeout=60s
        kubectl -n kube-system wait --for=condition=ready pod -l k8s-app=calico-node --timeout=120s
        echo "calico-node restarted"
        sleep 5
      fi
    fi

    # Fix server URL if pointing to cluster-IP
    if [ -f "$KUBECONFIG_FILE" ] && grep -q "10.96.0.1" "$KUBECONFIG_FILE" 2>/dev/null; then
      sed -i "s|server: https://10.96.0.1:443|server: $API_SERVER|" "$KUBECONFIG_FILE"
      echo "Fixed Calico kubeconfig: cluster-IP -> $API_SERVER"
    else
      echo "Calico kubeconfig already uses real API endpoint"
    fi
  become: true

- name: Ensure Multus CNI binary is in kubelet CNI path
  ansible.builtin.shell: |
    # Multus installs to /opt/cni/bin/ but kubelet may use /usr/libexec/cni/
    KUBELET_CNI=$(ps aux | grep kubelet | grep -oP '(?<=--cni-bin-dir=)\S+' || echo "/usr/libexec/cni")
    [ -z "$KUBELET_CNI" ] && KUBELET_CNI="/usr/libexec/cni"
    if [ -f /opt/cni/bin/multus ] && [ ! -f "$KUBELET_CNI/multus" ]; then
      ln -sf /opt/cni/bin/multus "$KUBELET_CNI/multus"
      echo "symlinked multus to $KUBELET_CNI/"
    fi
    if [ -f /opt/cni/bin/multus-shim ] && [ ! -f "$KUBELET_CNI/multus-shim" ]; then
      ln -sf /opt/cni/bin/multus-shim "$KUBELET_CNI/multus-shim"
      echo "symlinked multus-shim to $KUBELET_CNI/"
    fi
    echo "multus binaries verified"
  become: true

# ---- Create br-vm bridge + vxlan100 on the K8s node ----
- name: Get K8s node primary interface and IP
  ansible.builtin.shell: |
    NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
    echo "$NODE_IP"
  register: k8s_node_ip
  changed_when: false

- name: Create br-vm bridge and vxlan100
  ansible.builtin.shell: |
    set -e
    # Create bridge if not exists
    if ! ip link show br-vm &>/dev/null; then
      ip link add br-vm type bridge
      ip link set br-vm up
      echo "created br-vm bridge"
    fi

    # Assign management IP to bridge (for host-to-VM connectivity)
    if ! ip addr show br-vm | grep -q '{{ rac_bridge_ip }}/'; then
      ip addr add {{ rac_bridge_ip }}/24 dev br-vm
      echo "assigned {{ rac_bridge_ip }}/24 to br-vm"
    fi

    # Create VXLAN interface if not exists
    if ! ip link show vxlan100 &>/dev/null; then
      ip link add vxlan100 type vxlan id {{ rac_vxlan_id }} dstport {{ rac_vxlan_port }} local {{ k8s_node_ip.stdout }} nolearning
      ip link set vxlan100 master br-vm
      ip link set vxlan100 up
      echo "created vxlan100 (VNI {{ rac_vxlan_id }}, port {{ rac_vxlan_port }})"
    fi

    echo "L2 VXLAN bridge ready"
  become: true
  register: bridge_result

- name: Add FDB flooding entries for peer K8s nodes
  ansible.builtin.shell: |
    # Get all K8s node IPs except this node
    LOCAL_IP="{{ k8s_node_ip.stdout }}"
    for PEER_IP in $(kubectl get nodes -o jsonpath='{.items[*].status.addresses[?(@.type=="InternalIP")].address}'); do
      [ "$PEER_IP" = "$LOCAL_IP" ] && continue
      # Add BUM flooding entry for the peer
      bridge fdb append to 00:00:00:00:00:00 dst "$PEER_IP" dev vxlan100 2>/dev/null || true
      echo "FDB entry added for peer $PEER_IP"
    done
    echo "FDB entries configured"
  become: true
  changed_when: false

# ---- Create Multus NetworkAttachmentDefinition ----
- name: Create Multus NetworkAttachmentDefinition for RAC interconnect
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: rac-interconnect
        namespace: "{{ kubevirt_namespace }}"
      spec:
        config: |
          {
            "cniVersion": "0.3.1",
            "name": "rac-interconnect",
            "type": "bridge",
            "bridge": "{{ rac_interconnect_bridge }}",
            "isGateway": false,
            "ipam": {}
          }

- name: Display L2 network configuration
  ansible.builtin.debug:
    msg:
      - "✅ L2 VXLAN network created"
      - "  Bridge:     {{ rac_interconnect_bridge }}"
      - "  VXLAN VNI:  {{ rac_vxlan_id }}"
      - "  VXLAN port: {{ rac_vxlan_port }}"
      - "  Subnet:     {{ rac_interconnect_subnet }}"
      - "  Bridge IP:  {{ rac_bridge_ip }}/24"
      - "  NAD name:   rac-interconnect"
      - "  Node1:      {{ rac_node1_priv_ip }}"
      - "  Node2:      {{ rac_node2_priv_ip }}"
      - "  Standby:    {{ rac_standby_priv_ip }}"
      - "  SCAN:       {{ rac_scan_ip }}"
