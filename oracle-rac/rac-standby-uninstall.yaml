---
# Uninstall standby VM and its storage.

- name: "{{ rac_standby_name }} — Delete VirtualMachine"
  kubernetes.core.k8s:
    state: absent
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ rac_standby_name }}"
    namespace: "{{ kubevirt_namespace }}"
  failed_when: false

- name: "{{ rac_standby_name }} — Wait for VM deletion"
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ rac_standby_name }}"
    namespace: "{{ kubevirt_namespace }}"
  register: stby_del_check
  until: stby_del_check.resources | length == 0
  retries: 20
  delay: 5
  failed_when: false

- name: "{{ rac_standby_name }} — Delete PVC"
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolumeClaim
    name: "{{ rac_standby_name }}-system-disk"
    namespace: "{{ kubevirt_namespace }}"
  failed_when: false

- name: "{{ rac_standby_name }} — Delete PV"
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolume
    name: "{{ rac_standby_name }}-system-pv"
  failed_when: false

- name: "{{ rac_standby_name }} — Remove disk image"
  ansible.builtin.file:
    path: "{{ storage_dir }}/{{ rac_standby_name }}-system-disk/disk.img"
    state: absent
  failed_when: false

- name: "{{ rac_standby_name }} — Remove hostPath directory"
  ansible.builtin.file:
    path: "{{ storage_dir }}/{{ rac_standby_name }}-system-disk"
    state: absent
  failed_when: false

- name: "{{ rac_standby_name }} — Remove standby ASM disk images"
  ansible.builtin.file:
    path: "{{ rac_shared_disk_path }}/standby"
    state: absent
  become: true
  failed_when: false

- name: "{{ rac_standby_name }} — Delete cloud-init Secret"
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: "{{ rac_standby_name }}-cloudinit"
    namespace: "{{ kubevirt_namespace }}"
  failed_when: false

- name: Display standby cleanup status
  ansible.builtin.debug:
    msg: "✅ Standby VM {{ rac_standby_name }} removed (including ASM disks)"
