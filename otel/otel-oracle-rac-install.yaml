---
# OTel Collector integration for Oracle RAC cluster.
# Wires per-instance Oracle DB receivers for each RAC node + standby.
# Follows the combine() pattern used by otel-oracle-install.yaml.
#
# Required vars:
#   rac_otel_endpoint  — OTLP HTTP endpoint (e.g. https://xxx.collect.observeinc.com/v1/otel)
#   rac_otel_token     — Bearer token for the endpoint
#   rac_node_names     — list of RAC node VM names (from oracle-rac-controller)
#   rac_db_name        — database name (RACDB)
#   rac_pdb_name       — PDB name (RACPDB1)
#   rac_oracle_password — Oracle password for metrics collection

- name: Assert RAC OTel endpoint provided
  ansible.builtin.assert:
    that:
      - rac_otel_endpoint | default('') | length > 0
      - rac_otel_token | default('') | length > 0
    fail_msg: "rac_otel_endpoint and rac_otel_token must be provided for Oracle RAC telemetry."

# ---- Resolve RAC node L2 IPs ----
- name: Build RAC instance list for OTel
  ansible.builtin.set_fact:
    _otel_rac_instances: >-
      {{ _otel_rac_instances | default([]) + [{
        'name': item.name,
        'address': item.ip,
        'port': rac_listener_port | default(1521),
        'service': rac_pdb_name,
        'role': item.role
      }] }}
  loop:
    - { name: "{{ rac_node_names[0] }}", ip: "{{ rac_node1_priv_ip }}", role: "primary" }
    - { name: "{{ rac_node_names[1] }}", ip: "{{ rac_node2_priv_ip }}", role: "primary" }
  loop_control:
    label: "{{ item.name }}"
  when: rac_nodes | int > 0

- name: Add standby to OTel instance list
  ansible.builtin.set_fact:
    _otel_rac_instances: >-
      {{ _otel_rac_instances | default([]) + [{
        'name': rac_standby_name,
        'address': rac_standby_priv_ip,
        'port': rac_listener_port | default(1521),
        'service': rac_pdb_name,
        'role': 'standby'
      }] }}
  when: rac_dataguard | bool

- name: Display OTel RAC instance list
  ansible.builtin.debug:
    msg:
      - "Oracle RAC OTel instances to monitor:"
      - "{{ _otel_rac_instances }}"

# ---- Install node_exporter on each RAC VM for OS metrics ----
- name: Install node_exporter on RAC VMs
  delegate_to: localhost
  ansible.builtin.shell: |
    sshpass -p '{{ rac_oracle_password }}' ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
      root@{{ item.address }} 'bash -s' <<'REMOTE'
    set -e
    if systemctl is-active --quiet node_exporter 2>/dev/null; then
      echo "NODE_EXPORTER=already_running"
      exit 0
    fi
    # Install
    cd /tmp
    NODE_EXPORTER_VERSION="1.8.2"
    if [ ! -f "node_exporter-${NODE_EXPORTER_VERSION}.linux-amd64.tar.gz" ]; then
      curl -sLO "https://github.com/prometheus/node_exporter/releases/download/v${NODE_EXPORTER_VERSION}/node_exporter-${NODE_EXPORTER_VERSION}.linux-amd64.tar.gz"
    fi
    tar xzf "node_exporter-${NODE_EXPORTER_VERSION}.linux-amd64.tar.gz"
    cp "node_exporter-${NODE_EXPORTER_VERSION}.linux-amd64/node_exporter" /usr/local/bin/
    chmod +x /usr/local/bin/node_exporter

    # Create systemd service
    cat > /etc/systemd/system/node_exporter.service <<'SVC'
    [Unit]
    Description=Prometheus Node Exporter
    After=network.target
    [Service]
    Type=simple
    ExecStart=/usr/local/bin/node_exporter
    Restart=always
    [Install]
    WantedBy=multi-user.target
    SVC

    systemctl daemon-reload
    systemctl enable --now node_exporter
    echo "NODE_EXPORTER=installed"
    REMOTE
  register: _otel_node_exporter
  loop: "{{ _otel_rac_instances }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: "'installed' in _otel_node_exporter.stdout"
  failed_when: false

# ---- Merge per-instance receivers into otel_config ----
- name: Build Oracle RAC receiver config fragment
  ansible.builtin.set_fact:
    _rac_receivers: {}
    _rac_receiver_names: []

- name: Add each RAC instance receiver
  ansible.builtin.set_fact:
    _rac_receivers: >-
      {{ _rac_receivers | combine({
          'oracledb/rac-' ~ item.name: {
            'endpoint': item.address ~ ':' ~ (item.port | string),
            'service': item.service,
            'username': '${RAC_OTEL_DB_USER}',
            'password': '${RAC_OTEL_DB_PASS}',
            'collection_interval': '60s',
            'resource_attributes': {
              'db.instance': { 'value': item.name },
              'db.role': { 'value': item.role }
            }
          }
        }) }}
    _rac_receiver_names: "{{ _rac_receiver_names + ['oracledb/rac-' ~ item.name] }}"
  loop: "{{ _otel_rac_instances }}"
  loop_control:
    label: "{{ item.name }}"

# Add Prometheus scrape targets for node_exporter on each VM
- name: Add node_exporter Prometheus receivers
  ansible.builtin.set_fact:
    _rac_receivers: >-
      {{ _rac_receivers | combine({
          'prometheus/rac-' ~ item.name: {
            'config': {
              'scrape_configs': [{
                'job_name': 'rac-node-exporter-' ~ item.name,
                'scrape_interval': '30s',
                'static_configs': [{
                  'targets': [item.address ~ ':9100'],
                  'labels': {
                    'instance': item.name,
                    'role': item.role,
                    'cluster': rac_cluster_name | default('rac-cluster')
                  }
                }]
              }]
            }
          }
        }) }}
    _rac_receiver_names: "{{ _rac_receiver_names + ['prometheus/rac-' ~ item.name] }}"
  loop: "{{ _otel_rac_instances }}"
  loop_control:
    label: "{{ item.name }}"

- name: Merge Oracle RAC pipeline into collector config
  ansible.builtin.set_fact:
    otel_config: "{{ otel_config | combine(rac_config_fragment, recursive=True) }}"
  vars:
    rac_config_fragment:
      receivers: "{{ _rac_receivers }}"
      exporters:
        otlphttp/oracle-rac:
          endpoint: "${RAC_OTEL_ENDPOINT}"
          headers:
            Authorization: "Bearer ${RAC_OTEL_TOKEN}"
      service:
        pipelines:
          metrics/oracle-rac:
            receivers: "{{ _rac_receiver_names }}"
            processors:
              - batch
            exporters:
              - otlphttp/oracle-rac

- name: Append Oracle RAC env vars for deployment
  ansible.builtin.set_fact:
    otel_env_vars: "{{ otel_env_vars + [
      { 'name': 'RAC_OTEL_ENDPOINT', 'value': rac_otel_endpoint },
      { 'name': 'RAC_OTEL_TOKEN', 'value': rac_otel_token },
      { 'name': 'RAC_OTEL_DB_USER', 'value': rac_otel_db_user | default('system') },
      { 'name': 'RAC_OTEL_DB_PASS', 'value': rac_otel_db_pass | default(rac_oracle_password) }
    ] }}"

- name: Register Oracle RAC OTel metadata
  ansible.builtin.set_fact:
    configured_oracle_rac_collectors: "{{ _otel_rac_instances | map(attribute='name') | list }}"

- name: Display Oracle RAC OTel configuration status
  ansible.builtin.debug:
    msg:
      - "Oracle RAC telemetry configured"
      - "  Instances:   {{ configured_oracle_rac_collectors | join(', ') }}"
      - "  DB Receivers: {{ _rac_receiver_names | select('match', '^oracledb/') | list | length }}"
      - "  OS Receivers: {{ _rac_receiver_names | select('match', '^prometheus/') | list | length }}"
      - "  Endpoint:    {{ rac_otel_endpoint }}"
